name: Publish Package

on:
  workflow_dispatch:  # manual trigger
  push:
    paths:
      - "pyproject.toml"  # triggers when TOML changes

jobs:
  publish:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install Hatch
        run: |
          python -m pip install --upgrade pip
          pip install hatch

      - name: Build package
        run: hatch build  # default wheel build

      - name: Publish package
        run: hatch publish -u __token__ -a "${{ secrets.PYPI_TOKEN }}"
